<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora BCV</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10149/10149458.png">
    <style>
        :root { --primary: #004a99; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 20px; }
        .section { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 0.9rem; }
        .input-group { display: flex; gap: 8px; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; 
            font-size: 1.1rem; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-edit { padding: 10px; background: #6c757d; color: white; border: none; border-radius: 10px; cursor: pointer; white-space: nowrap; }
        .btn-edit.active { background: #e74c3c; }
        .result-box { 
            background: linear-gradient(135deg, #004a99, #003366); padding: 20px; 
            border-radius: 15px; text-align: center; color: white;
        }
        .result-value { font-size: 2.2rem; font-weight: bold; margin-top: 5px; }
        .status { font-size: 0.7rem; text-align: center; margin-top: 15px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora BCV</h2>
    
    <div class="section">
        <label>Tasa USD (BCV)</label>
        <div class="input-group">
            <input type="number" id="tasa-input" step="0.01" disabled>
            <button class="btn-edit" id="btn-toggle-edit">Editar</button>
        </div>
    </div>

    <div class="section">
        <label>Monto en Dólares ($)</label>
        <input type="number" id="monto-usd" placeholder="0.00" step="0.01" inputmode="decimal">
    </div>

    <div class="result-box">
        <div style="font-size: 0.8rem; opacity: 0.8; letter-spacing: 1px;">TOTAL EN BOLÍVARES</div>
        <div class="result-value" id="resultado-bs">0,00 Bs.</div>
    </div>

    <div class="status" id="status-text">Intentando conectar con BCV...</div>
</div>

<script>
    const tasaInput = document.getElementById('tasa-input');
    const montoInput = document.getElementById('monto-usd');
    const resultadoDisplay = document.getElementById('resultado-bs');
    const btnEdit = document.getElementById('btn-toggle-edit');
    const statusText = document.getElementById('status-text');

    let esManual = false;

    // Guardado local
    function guardar() {
        localStorage.setItem('monto', montoInput.value);
        localStorage.setItem('tasa', tasaInput.value);
    }

    // Carga inicial
    function cargar() {
        montoInput.value = localStorage.getItem('monto') || "";
        tasaInput.value = localStorage.getItem('tasa') || "0.00";
        calcular();
    }

    // --- NUEVA FUNCIÓN PARA OBTENER TASA (Varios intentos) ---
    async function obtenerTasa() {
        if (esManual) return;

        // Intento 1: API de DolarApi (Suele ser muy estable y sin CORS)
        try {
            const response = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
            const data = await response.json();
            if (data.promedio) {
                tasaInput.value = data.promedio;
                statusText.innerText = "Tasa BCV actualizada (Fuente: DolarApi)";
                guardar();
                calcular();
                return;
            }
        } catch (e) {
            console.log("Fallo Intento 1, probando respaldo...");
        }

        // Intento 2: API de PyDolar (Respaldo)
        try {
            const response = await fetch('https://www.bcvapi.tech/');
            const data = await response.json();
            const precio = data.monitors.usd.price;
            if (precio) {
                tasaInput.value = precio;
                statusText.innerText = "Tasa BCV actualizada (Fuente: PyDolar)";
                guardar();
                calcular();
                return;
            }
        } catch (e) {
            statusText.innerText = "Error de conexión. Ingrese tasa manual.";
        }
    }

    function calcular() {
        const tasa = parseFloat(tasaInput.value) || 0;
        const monto = parseFloat(montoInput.value) || 0;
        const total = tasa * monto;
        resultadoDisplay.innerText = total.toLocaleString('es-VE', { minimumFractionDigits: 2 }) + " Bs.";
        guardar();
    }

    btnEdit.addEventListener('click', () => {
        esManual = !esManual;
        tasaInput.disabled = !esManual;
        btnEdit.innerText = esManual ? "Fijar" : "Editar";
        btnEdit.classList.toggle('active', esManual);
        if (!esManual) obtenerTasa();
    });

    montoInput.addEventListener('input', calcular);
    tasaInput.addEventListener('input', calcular);

    cargar();
    obtenerTasa();
</script>

</body>
</html>
